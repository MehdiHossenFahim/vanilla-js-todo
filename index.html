<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Task Manager</title>
    <link rel="stylesheet" href="style.css">
    <!-- fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inconsolata:wght@200..900&family=Jura:wght@300..700&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
</head>

<body>
    <header class="gradient-background">
        <div class="title">
            <h1>Student Task Manager</h1>
            <h2>To-do List</h2>

        </div>
        <button type="button" id="theme" class="gradient-background"> Change Theme</button>


    </header>
    <main>
        <div class="container">
            <div>
                <h3>Today: <span id="date">21 June 2026</span></h3>
                <h3> <span id="time">21 June 2026</span></h3>
            </div>
        </div>

    </main>
    <footer class="gradient-background">
        &copy; <span id="footerYear"></span>. Mehedi Hossen Fahim.
    </footer>

    <script src="script.js" charset="UTF-8"></script>
</body>

</html>
