<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Task Manager</title>
    <link rel="shortcut icon"
        href="https://raw.githubusercontent.com/MehdiHossenFahim/vanilla-js-todo/refs/heads/main/check-list.png"
        type="">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inconsolata:wght@200..900&family=Jura:wght@300..700&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
</head>

<body>
    <header class="gradient-background">
        <h1>Student Task Manager</h1>
        <button type="button" id="theme"> 🌘Toogle</button>
    </header>

    <main>
        <div class="container">
            <div class="grid">

                <div id="dateTime">
                    <h3><b>Today:</b> <span id="date">21 June 2026</span></h3>
                    <h3> <span id="time">10:30:36 AM</span></h3>
                </div>

                <form action="" method="post">
                    <input type="text" name="title" id="title" placeholder="Task Name" required>

                    <input type="text" name="subject" id="subject" placeholder="Subject" required>

                    <label for="priority">Priority</label>
                    <select id="priority" name="priority">
                        <option value="high">High</option>
                        <option value="medium">Medium</option>
                        <option value="low">Low</option>
                    </select>

                    <button type="submit" class="addbtn">Add Task</button>
                </form>
            </div>
        </div>

        <div class="tasks">
            <h2>To-Do List</h2>
            <div class="counter-box">
                <div class="task-counter">
                    <p><b>Total Tasks :</b> <span id="total"> 0</span> </p>
                    <p><b>Completed :</b> <span id="completed"> 0</span> </p>
                    <p><b>Pending : </b><span id="pending"> 0</span> </p>
                </div>
                <div class="button-group">
                    <p>Filter</p>
                    <input type="radio" id="option1" value="all" name="toggle-buttons" checked />
                    <label for="option1">All</label>

                    <input type="radio" id="option2" value="completed" name="toggle-buttons" />
                    <label for="option2">Completed</label>

                    <input type="radio" id="option3" value="pending" name="toggle-buttons" />
                    <label for="option3">Pending</label>
                </div>

            </div>
        </div>



    </main>

    <footer class="gradient-background">
        &copy; <span id="footerYear"></span>. Mehedi Hossen Fahim.
    </footer>

    <script src="script.js" charset="UTF-8"></script>
</body>

</html>
